<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierra Miles TechOps Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #020617; }
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .animate-ticker { animation: ticker 40s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, ResponsiveContainer, AreaChart, Area } = Recharts;

        const App = () => {
            const [time, setTime] = useState(new Date().toLocaleTimeString());
            const [metrics, setMetrics] = useState({ traffic: [], labor: [], nodes: [], kpis: [] });

            const generate = () => {
                const traffic = Array.from({ length: 20 }, (_, i) => ({ t: i, val: Math.floor(Math.random() * 10) }));
                const labor = [
                    { n: 'MON', b: 4.2, i: 3.8 }, { n: 'TUE', b: 3.8, i: 4.2 },
                    { n: 'WED', b: 5.1, i: 2.9 }, { n: 'THU', b: 2.5, i: 5.5 },
                    { n: 'FRI', b: 3.2 + Math.random(), i: 4.8 }
                ];
                const nodes = Array.from({ length: 12 }, (_, i) => ({ id: `N-${i}`, s: Math.random() > 0.9 ? 'w' : 'u' }));
                const kpis = [
                    { l: 'SLA', v: (99.2 + Math.random() * 0.5).toFixed(1) + '%' },
                    { l: 'RESP', v: Math.floor(10 + Math.random() * 5) + 'm' },
                    { l: 'OPEN', v: Math.floor(10 + Math.random() * 10) },
                    { l: 'STALE', v: Math.floor(Math.random() * 4) }
                ];
                setMetrics({ traffic, labor, nodes, kpis });
            };

            useEffect(() => {
                generate();
                const t = setInterval(() => setTime(new Date().toLocaleTimeString()), 1000);
                const d = setInterval(generate, 15000);
                return () => { clearInterval(t); clearInterval(d); };
            }, []);

            return (
                <div className="h-screen w-screen flex flex-col p-4 text-slate-300 font-sans">
                    {/* Header */}
                    <header className="flex justify-between items-center border-b border-blue-500/20 pb-3 mb-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-2 rounded shadow-lg shadow-blue-500/20">
                                <div className="w-5 h-5 border-2 border-white rounded-full"></div>
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white italic uppercase tracking-tighter">Sierra Miles <span className="text-blue-400 not-italic">TechOps</span></h1>
                                <div className="text-[8px] font-mono tracking-widest text-slate-500 uppercase">{time} // Command Active</div>
                            </div>
                        </div>
                        <div className="flex gap-1">
                            {metrics.nodes.map((n, i) => (
                                <div key={i} className={`w-1 h-3 rounded-sm ${n.s === 'u' ? 'bg-emerald-500/30' : 'bg-amber-500 animate-pulse'}`}></div>
                            ))}
                        </div>
                    </header>

                    {/* Content Grid */}
                    <main className="grid grid-cols-12 gap-4 flex-grow min-h-0 mb-8">
                        {/* Left */}
                        <div className="col-span-3 flex flex-col gap-4">
                            <div className="bg-slate-900/20 border border-slate-800/40 p-4 rounded-xl">
                                <h3 className="text-[8px] font-black text-blue-400 uppercase tracking-widest mb-4">Utilization</h3>
                                <div className="flex justify-around">
                                    <div className="w-16 h-16 border-4 border-blue-600 rounded-full flex items-center justify-center text-xs font-bold italic">3.2</div>
                                    <div className="w-16 h-16 border-4 border-emerald-500/30 rounded-full flex items-center justify-center text-xs font-bold italic text-emerald-400">18.5</div>
                                </div>
                            </div>
                            <div className="bg-slate-900/20 border border-slate-800/40 p-4 rounded-xl flex-grow overflow-hidden">
                                <h3 className="text-[8px] font-black text-blue-400 uppercase tracking-widest mb-3">Tech Leaders</h3>
                                {['Alex M.', 'Sarah J.', 'David K.'].map((t, i) => (
                                    <div key={i} className="flex justify-between p-2 mb-1 bg-slate-950/30 rounded border border-slate-800/20 text-[10px]">
                                        <span className="font-bold text-white">{t}</span>
                                        <span className="text-blue-400 font-mono italic">{4.2 - (i*0.2)}h</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Center */}
                        <div className="col-span-6 flex flex-col gap-4">
                            <div className="bg-slate-900/20 border border-slate-800/40 p-4 rounded-xl flex-grow min-h-0">
                                <h3 className="text-[8px] font-black text-blue-400 uppercase tracking-widest mb-4">Resolution Trend</h3>
                                <ResponsiveContainer width="100%" height="90%">
                                    <BarChart data={metrics.labor}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#1e293b" />
                                        <XAxis dataKey="n" axisLine={false} tick={{fill: '#475569', fontSize: 9}} />
                                        <Bar dataKey="b" fill="#2563eb" barSize={30} />
                                        <Bar dataKey="i" fill="#1e293b" barSize={30} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="bg-slate-950 border border-slate-800/50 p-4 rounded-xl h-32 opacity-50">
                                <h3 className="text-[8px] font-black text-rose-500 uppercase tracking-widest mb-2">Anomaly Detection</h3>
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={metrics.traffic}>
                                        <Area type="step" dataKey="val" stroke="#ef4444" fill="#ef4444" fillOpacity={0.1} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        {/* Right */}
                        <div className="col-span-3 flex flex-col gap-4">
                            <div className="grid grid-cols-2 gap-2">
                                {metrics.kpis.map((k, i) => (
                                    <div key={i} className="bg-slate-900/20 border border-slate-800/40 p-2 rounded-lg text-center">
                                        <div className="text-[6px] text-slate-500 font-bold uppercase">{k.l}</div>
                                        <div className="text-xs font-mono font-black text-blue-400 italic">{k.v}</div>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-blue-950/10 border border-blue-500/20 p-3 rounded-xl flex-grow overflow-hidden font-mono text-[8px] opacity-60">
                                <div className="text-emerald-500 truncate">> SYSLOG: REPLICATION SUCCESS</div>
                                <div className="text-slate-500 truncate">> TICKETS: 14 OPEN / 2 STALE</div>
                                <div className="text-blue-400 truncate">> BACKUP: JOB COMPLETE</div>
                                <div className="text-amber-500 animate-pulse truncate">> MONITOR: PBX-01 LATENCY</div>
                            </div>
                            <div className="bg-slate-950 border border-rose-900/20 h-32 rounded-xl flex items-center justify-center relative overflow-hidden">
                                <div className="text-[8px] text-rose-500 font-black absolute top-2 left-2 uppercase tracking-widest">Global Scan</div>
                                <div className="w-1 h-1 bg-rose-500 rounded-full animate-ping"></div>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="fixed bottom-0 left-0 right-0 bg-[#020617] border-t border-blue-900/30 h-7 flex items-center z-50">
                        <div className="bg-blue-600 h-full px-4 flex items-center text-[8px] font-black text-white italic skew-x-[-15deg] -ml-2 z-20">NOMINAL</div>
                        <div className="flex-grow overflow-hidden relative">
                            <div className="animate-ticker whitespace-nowrap flex gap-20 text-[8px] font-mono font-bold text-slate-600 uppercase tracking-widest">
                                <span>[SYSTEM] BKUP-SVR LATENCY STABILIZED</span>
                                <span className="text-blue-400">• TEAM BILLABLE TARGET: 92% •</span>
                                <span>[SECURITY] BLOCKED BRUTE FORCE ON EDGE-GW-01</span>
                                <span className="text-emerald-400">• CRITICAL VULN #8841 RESOLVED •</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
