<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierra Miles | TechOps Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts/umd/Recharts.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #020617; 
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-ticker { animation: ticker 40s linear infinite; }
        /* Prevent layout shifts */
        * { box-sizing: border-box; }
        .chart-container { min-height: 0; flex: 1 1 0%; }
    </style>
</head>
<body>
    <div id="root">
        <div style="color: white; padding: 20px;">Loading Sierra Miles Command Center...</div>
    </div>

    <script type="text/babel">
        // Ensure Recharts is loaded from global window
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, 
            ResponsiveContainer, AreaChart, Area, Tooltip 
        } = window.Recharts;

        const { useState, useEffect } = React;

        const App = () => {
            const [time, setTime] = useState(new Date().toLocaleTimeString());
            const [sync, setSync] = useState(15);
            const [data, setData] = useState({ traffic: [], labor: [], nodes: [], kpis: [] });

            const refreshData = () => {
                const traffic = Array.from({ length: 20 }, (_, i) => ({ t: i, v: Math.floor(Math.random() * 8) + 2 }));
                const labor = [
                    { n: 'MON', b: 4.2, i: 3.8 }, { n: 'TUE', b: 3.8, i: 4.2 },
                    { n: 'WED', b: 5.1, i: 2.9 }, { n: 'THU', b: 2.5, i: 5.5 },
                    { n: 'FRI', b: 3.5, i: 4.5 }
                ];
                const nodes = Array.from({ length: 14 }, (_, i) => ({ s: Math.random() > 0.9 ? 'w' : 'u' }));
                const kpis = [
                    { l: 'SLA COMPLIANCE', v: (99.4 + Math.random() * 0.4).toFixed(1) + '%', c: 'text-emerald-400' },
                    { l: 'AVG RESPONSE', v: '12m', c: 'text-blue-400' },
                    { l: 'OPEN TICKETS', v: Math.floor(10 + Math.random() * 5), c: 'text-amber-500' },
                    { l: 'STALE TICKETS', v: '2', c: 'text-rose-500' }
                ];
                setData({ traffic, labor, nodes, kpis });
                setSync(15);
            };

            useEffect(() => {
                refreshData();
                const timer = setInterval(() => {
                    setTime(new Date().toLocaleTimeString());
                    setSync(s => (s > 1 ? s - 1 : 15));
                }, 1000);
                const syncTimer = setInterval(refreshData, 15000);
                return () => { clearInterval(timer); clearInterval(syncTimer); };
            }, []);

            return (

                    {/* Header */}
                    <header className="flex justify-between items-center border-b-2 border-blue-500/20 pb-4 mb-6 flex-shrink-0">
                        <div className="flex items-center gap-4">
                            <div className="bg-blue-600 p-2 rounded shadow-lg shadow-blue-500/40 border border-blue-400/30">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-white italic uppercase tracking-tighter">Sierra Miles <span className="text-blue-400 not-italic">TechOps</span></h1>
                                <div className="text-[10px] font-mono text-slate-500 tracking-widest uppercase">{time} // SYNC: {sync}s // <span className="text-emerald-500">NOMINAL</span></div>
                            </div>
                        </div>
                        <div className="flex gap-1.5">
                            {data.nodes.map((n, i) => (
                                <div key={i} className={`w-1.5 h-4 rounded-sm ${n.s === 'u' ? 'bg-blue-500/20' : 'bg-amber-500 animate-pulse'}`}></div>
                            ))}
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="grid grid-cols-12 gap-6 flex-grow min-h-0 mb-10 overflow-hidden">
                        {/* Col 1 */}
                        <div className="col-span-3 flex flex-col gap-6">
                            <section className="bg-slate-900/30 border border-slate-800/50 p-5 rounded-2xl">
                                <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4">Utilization</h3>
                                <div className="flex justify-around items-end">
                                    <div className="text-center">
                                        <div className="text-3xl font-mono font-black text-white italic">3.2<span className="text-xs text-slate-500">h</span></div>
                                        <div className="text-[8px] font-bold text-slate-500 uppercase mt-1">Daily Avg</div>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-3xl font-mono font-black text-emerald-400 italic">18.5<span className="text-xs text-slate-500">h</span></div>
                                        <div className="text-[8px] font-bold text-slate-500 uppercase mt-1">Weekly Tot</div>
                                    </div>
                                </div>
                            </section>
                            <section className="bg-slate-900/30 border border-slate-800/50 p-5 rounded-2xl flex-grow overflow-hidden">
                                <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4">On-Call Engineers</h3>
                                <div className="space-y-3">
                                    {['Alex M.', 'Sarah J.', 'David K.', 'Elena R.'].map((t, i) => (
                                        <div key={i} className="flex justify-between items-center p-3 bg-slate-950/40 rounded-xl border border-slate-800/30">
                                            <span className="text-xs font-bold text-white uppercase">{t}</span>
                                            <span className="text-[10px] font-mono font-black text-blue-400 italic">ACTIVE</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        {/* Col 2 */}
                        <div className="col-span-6 flex flex-col gap-6">
                            <section className="bg-slate-900/30 border border-slate-800/50 p-6 rounded-2xl flex-grow flex flex-col min-h-0">
                                <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-6">Resolution Trend</h3>
                                <div className="flex-grow w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={data.labor} margin={{top:0, right:0, left:-20, bottom:0}}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#1e293b" />
                                            <XAxis dataKey="n" axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 11, fontWeight: 'bold'}} />
                                            <Bar dataKey="b" fill="#2563eb" barSize={45} radius={[4, 4, 0, 0]} />
                                            <Bar dataKey="i" fill="#1e293b" barSize={45} radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </Responsive
