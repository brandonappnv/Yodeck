<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierra Miles TechOps | NOC Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: #020617; 
            cursor: none; /* Hide cursor for clean TV display */
            user-select: none; /* Prevent accidental highlighting */
        }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-ticker { animation: ticker 40s linear infinite; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, ResponsiveContainer, AreaChart, Area } = Recharts;

        const App = () => {
            const [time, setTime] = useState(new Date().toLocaleTimeString());
            const [syncIn, setSyncIn] = useState(15);
            const [metrics, setMetrics] = useState({ traffic: [], labor: [], nodes: [], kpis: [] });

            const generate = () => {
                const traffic = Array.from({ length: 20 }, (_, i) => ({ t: i, val: Math.floor(Math.random() * 8) + 2 }));
                const labor = [
                    { n: 'MON', b: 4.2, i: 3.8 }, { n: 'TUE', b: 3.8, i: 4.2 },
                    { n: 'WED', b: 5.1, i: 2.9 }, { n: 'THU', b: 2.5, i: 5.5 },
                    { n: 'FRI', b: 3.2 + Math.random(), i: 4.8 }
                ];
                const nodes = Array.from({ length: 12 }, (_, i) => ({ id: `N-${i}`, s: Math.random() > 0.9 ? 'w' : 'u' }));
                const kpis = [
                    { l: 'SLA COMPLIANCE', v: (99.2 + Math.random() * 0.5).toFixed(1) + '%' },
                    { l: 'AVG RESPONSE', v: Math.floor(10 + Math.random() * 5) + 'm' },
                    { l: 'OPEN TICKETS', v: Math.floor(10 + Math.random() * 10) },
                    { l: 'STALE TICKETS', v: Math.floor(Math.random() * 4) }
                ];
                setMetrics({ traffic, labor, nodes, kpis });
                setSyncIn(15);
            };

            useEffect(() => {
                generate();
                const clock = setInterval(() => {
                    setTime(new Date().toLocaleTimeString());
                    setSyncIn(prev => (prev > 1 ? prev - 1 : 15));
                }, 1000);
                const dataSync = setInterval(generate, 15000);
                return () => { clearInterval(clock); clearInterval(dataSync); };
            }, []);

            return (
                <div className="h-screen w-screen flex flex-col p-6 text-slate-300 font-sans overflow-hidden">
                    {/* Header: Optimized Branding Height */}
                    <header className="flex justify-between items-center border-b-2 border-blue-500/20 pb-4 mb-6 flex-shrink-0">
                        <div className="flex items-center gap-5">
                            <div className="bg-blue-600 p-2 rounded shadow-lg shadow-blue-500/30 border border-blue-400/30">
                                <div className="w-6 h-6 border-2 border-white rounded-sm flex items-center justify-center font-black">S</div>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-white italic uppercase tracking-tighter">
                                    Sierra Miles <span className="text-blue-400 not-italic">TechOps NOC</span>
                                </h1>
                                <div className="text-[10px] font-mono tracking-[0.2em] text-slate-500 uppercase">
                                    {time} // DATA SYNC: {syncIn}s // <span className="text-emerald-500">SYSTEM NOMINAL</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col items-end gap-1">
                            <span className="text-[9px] font-black text-slate-500 uppercase tracking-widest">Global Fleet Status</span>
                            <div className="flex gap-1.5">
                                {metrics.nodes.map((n, i) => (
                                    <div key={i} className={`w-1.5 h-4 rounded-sm ${n.s === 'u' ? 'bg-emerald-500/20' : 'bg-amber-500 animate-pulse shadow-[0_0_8px_rgba(245,158,11,0.5)]'}`}></div>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* Dashboard Grid: Strictly Non-Overlapping */}
                    <main className="grid grid-cols-12 gap-6 flex-grow min-h-0 mb-10 overflow-hidden">
                        
                        {/* Column 1: Capacity & Team */}
                        <div className="col-span-3 flex flex-col gap-6 min-h-0">
                            <section className="bg-slate-900/20 border border-slate-800/40 p-5 rounded-2xl">
                                <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <div className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
                                    Labor Utilization
                                </h3>
                                <div className="flex justify-around items-end">
                                    <div className="text-center">
                                        <div className="text-3xl font-mono font-black italic text-white">3.2<span className="text-xs text-slate-500 ml-1">h</span></div>
                                        <div className="text-[8px] text-slate-500 font-bold uppercase mt-1">Daily Avg</div>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-3xl font-mono font-black italic text-emerald-400">18.5<span className="text-xs text-slate-500 ml-1">h</span></div>
                                        <div className="text-[8px] text-slate-500 font-bold uppercase mt-1">Weekly Tot</div>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-slate-900/20 border border-slate-800/40 p-5 rounded-2xl flex-grow flex flex-col min-h-0 overflow-hidden">
                                <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4">On-Call Engineers</h3>
                                <div className="space-y-3">
                                    {['Alex M.', 'Sarah J.', 'David K.', 'Elena R.'].map((t, i) => (
                                        <div key={i} className="flex justify-between items-center p-3 bg-slate-950/40 rounded-xl border border-slate-800/30">
                                            <div className="flex items-center gap-3">
                                                <div className="w-2 h-2 rounded-full bg-emerald-500"></div>
                                                <span className="text-xs font-bold text-white uppercase">{t}</span>
                                            </div>
                                            <span className="text-xs font-mono font-black text-blue-400 italic">ACTIVE</span>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        {/* Column 2: Large Analytics */}
                        <div className="col-span-6 flex flex-col gap-6 min-h-0">
                            <section className="bg-slate-900/20 border border-slate-800/40 p-6 rounded-2xl flex-grow flex flex-col min-h-0">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest">Ticket Productivity Trend</h3>
                                    <div className="flex gap-4 text-[9px] font-bold text-slate-500">
                                        <span className="flex items-center gap-2"><div className="w-3 h-1 bg-blue-600"></div> BILLABLE</span>
                                        <span className="flex items-center gap-2"><div className="w-3 h-1 bg-slate-800"></div> INTERNAL</span>
                                    </div>
                                </div>
                                <div className="flex-grow w-full">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={metrics.labor} margin={{top:0, right:0, left:-20, bottom:0}}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#1e293b" />
                                            <XAxis dataKey="n" axisLine={false} tickLine={false} tick={{fill: '#475569', fontSize: 11, fontWeight: 'bold'}} />
                                            <Bar dataKey="b" fill="#2563eb" barSize={45} radius={[4, 4, 0, 0]} />
                                            <Bar dataKey="i" fill="#1e293b" barSize={45} radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </section>

                            <section className="bg-slate-950 border border-slate-800/50 p-6 rounded-2xl h-44 flex flex-col min-h-0">
                                <h3 className="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <div className="w-2 h-2 bg-rose-500 rounded-full animate-ping"></div>
                                    Network Security Anomaly Detection
                                </h3>
                                <div className="flex-grow w-full opacity-40">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <AreaChart data={metrics.traffic}>
                                            <Area type="monotone" dataKey="val" stroke="#ef4444" fill="#ef4444" fillOpacity={0.2} strokeWidth={3} />
                                        </AreaChart>
                                    </ResponsiveContainer>
                                </div>
                            </section>
                        </div>

                        {/* Column 3: Metrics & Console */}
                        <div className="col-span-3 flex flex-col gap-6 min-h-0">
                            <div className="grid grid-cols-2 gap-3">
                                {metrics.kpis.map((k, i) => (
                                    <div key={i} className="bg-slate-900/20 border border-slate-800/40 p-4 rounded-xl text-center">
                                        <div className="text-[8px] text-slate-500 font-black uppercase tracking-widest mb-1">{k.l}</div>
                                        <div className="text-lg font-mono font-black text-blue-400 italic leading-none">{k.v}</div>
                                    </div>
                                ))}
                            </div>

                            <section className="bg-blue-950/10 border border-blue-500/20 p-5 rounded-2xl flex-grow flex flex-col min-h-0 overflow-hidden">
                                <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4">Operations Log</h3>
                                <div className="font-mono text-[9px] space-y-2 opacity-60">
                                    <div className="text-emerald-500 truncate">> [INFO] DC-01 REPLICATION SUCCESS</div>
                                    <div className="text-slate-400 truncate">> [AUTH] USER 884-J LOGOUT</div>
                                    <div className="text-blue-400 truncate">> [BKUP] NIGHTLY SQL JOBS COMPLETE</div>
                                    <div className="text-slate-400 truncate">> [INFO] CACHE FLUSH REGION-2</div>
                                    <div className="text-amber-500 animate-pulse truncate">> [WARN] PBX-01 LATENCY DETECTED</div>
                                    <div className="text-slate-400 truncate">> [INFO] SOC-P ENGINE START</div>
                                </div>
                            </section>

                            <section className="bg-slate-950 border border-slate-800/50 h-44 rounded-2xl flex items-center justify-center relative overflow-hidden">
                                <div className="absolute inset-0 opacity-10 flex items-center justify-center">
                                    <div className="w-48 h-48 border border-blue-500/20 rounded-full animate-[ping_4s_linear_infinite]"></div>
                                    <div className="w-24 h-24 border border-blue-500/20 rounded-full animate-[ping_3s_linear_infinite]"></div>
                                </div>
                                <div className="text-[9px] text-rose-500 font-black uppercase tracking-[0.3em] z-10">Threat Scan Active</div>
                            </section>
                        </div>
                    </main>

                    {/* Footer: Ticker */}
                    <footer className="fixed bottom-0 left-0 right-0 bg-[#020617] border-t border-blue-900/30 h-8 flex items-center z-50">
                        <div className="bg-blue-600 h-full px-6 flex items-center text-[10px] font-black text-white italic skew-x-[-20deg] -ml-3 z-20">
                            OPS STATUS: NOMINAL
                        </div>
                        <div className="flex-grow overflow-hidden relative">
                            <div className="animate-ticker whitespace-nowrap flex gap-24 text-[10px] font-mono font-bold text-slate-500 uppercase tracking-[0.2em]">
                                <span>[NETWORK] BKUP-SVR LATENCY STABILIZED AT 0ms</span>
                                <span className="text-blue-400">• MISSION CRITICAL: 100% UPTIME MAINTAINED •</span>
                                <span>[SECURITY] SOC BLOCKED BRUTE FORCE ATTEMPT ON EDGE-GW-01</span>
                                <span className="text-emerald-400">• SARAH J. RESOLVED CRITICAL VULN #8841 •</span>
                                <span>[UPDATE] NEXT DATA SYNCHRONIZATION PENDING...</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
